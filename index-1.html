<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date With Me?</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      position: relative;
    }

    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      color: rgba(255,255,255,0.7);
      animation: float 8s linear infinite;
      font-size: 20px;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      padding: 40px 30px;
      border-radius: 30px;
      text-align: center;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.2);
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    h1 {
      font-size: 2.3rem;
      color: white;
      margin-bottom: 15px;
    }

    p {
      color: white;
      font-size: 1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .yes-btn {
      background: white;
      color: #ff4f81;
      box-shadow: 0 5px 15px rgba(255,255,255,0.3);
    }

    .yes-btn:hover {
      transform: scale(1.08);
    }

    .no-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      position: relative;
    }

    .popup {
      margin-top: 25px;
      color: white;
      font-size: 1.2rem;
      display: none;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="card">
    <h1>Hey Babe 💌</h1>
    <p>
      Life has been busy, but I still want moments that are just us.
      Soooo... would you go on a cute date with me soon? 🌙✨
    </p>

    <div class="buttons">
      <button class="yes-btn" onclick="sayYes()">YES OF COURSE 💖</button>
      <button class="no-btn" id="noBtn">No 😶</button>
    </div>

    <div class="popup" id="popup">
      YAYYYY 💕 Now you officially owe me a date night 😌
    </div>
  </div>

  <script>
    const heartsContainer = document.getElementById('hearts');

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
      heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
      heartsContainer.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 9000);
    }

    setInterval(createHeart, 300);

    function sayYes() {
      document.getElementById('popup').style.display = 'block';
    }

    const noBtn = document.getElementById('noBtn');

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
      const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

      noBtn.style.position = 'absolute';
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    });
  </script>
</body>
</html>
